[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "theiss-package"
version = "0.1.0"
description = "GIS urban analysis package"
authors = [{name = "Said Bereiya", email = "your.email@example.com"}]
dependencies = [
    "geopandas",
    "folium",
    "seaborn",
    "osmnx == 2.1.0
    "geopandas == 1.1.2,
    "pandas==3.0.0,
    "folium == 0.20.0,
    "mapclassify ==2.10.0,
    "numpy",
    "seaborn" == 0.13.2,
    "contextily"==1.7.0,
    "matplotlib"==3.10.8,
    "ezdxf"==1.4.3
]
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT"
]